<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 400px;
        }
        h1 { margin-bottom: 0.5rem; font-weight: 600; }
        p { font-weight: 300; opacity: 0.9; }
        .button {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 2rem;
            background: white;
            color: #764ba2;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .button:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Space</h1>
        <p>I'm a creator building things on the web. Welcome to my GitHub-hosted home.</p>
        <img src="profile.jpg" style="width:150px; border-radius:50%;">
        <a href="#" class="button">View My Work</a>
    </div>
</body>
</html>
