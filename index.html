<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paatra | Photography Portfolio</title>
    <style>
        /* CSS Reset & Core Styling */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html {
            scroll-behavior: smooth;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background-color: #0a0a0a; 
            color: #ffffff; 
            line-height: 1.6; 
        }

        /* Hero Section - The First Impression */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Update this URL with your own best photograph! */
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(10, 10, 10, 0.9)), 
                        url('images/paatra_profile.png') center/cover no-repeat fixed;
        }

        .hero h1 { 
            font-size: clamp(3rem, 8vw, 6rem); 
            letter-spacing: 8px; 
            margin-bottom: 15px; 
            font-weight: 300; 
            text-transform: uppercase;
        }

        .hero p { 
            font-size: 1.2rem; 
            margin-bottom: 40px; 
            color: #d1d1d1; 
            font-weight: 300;
            letter-spacing: 1px;
        }

        .btn {
            padding: 14px 35px; 
            border: 1px solid #ffffff; 
            color: #ffffff; 
            text-decoration: none;
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover { 
            background: #ffffff; 
            color: #0a0a0a; 
        }

        /* Gallery Section */
        .gallery-container { 
            padding: 6rem 2rem; 
            max-width: 1400px; 
            margin: 0 auto; 
        }

        .gallery-container h2 { 
            text-align: center;
            font-size: 2rem; 
            margin-bottom: 4rem; 
            font-weight: 300; 
            letter-spacing: 4px; 
            text-transform: uppercase;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Hover Effect for Images */
        .gallery-item:hover img { 
            transform: scale(1.08); 
        }
        
        .gallery-item::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.2);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover::after {
            opacity: 1;
        }

        /* Minimal Footer */
        footer { 
            text-align: center; 
            padding: 3rem; 
            border-top: 1px solid #1f1f1f; 
            font-size: 0.9rem; 
            color: #666; 
            letter-spacing: 1px;
        }
        
        footer a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.3s;
        }
        
        footer a:hover {
            color: #999;
        }

    </style>
</head>
<body>

    <header class="hero">
        <h1>Paatra</h1>
        <p>Capturing the unseen details of the world.</p>
        <a href="#portfolio" class="btn">View My Work</a>
    </header>

    <section id="portfolio" class="gallery-container">
        <h2>Selected Works</h2>
        <div class="gallery">
           <div class="gallery-item"><img src="images/gallery_photo1.png" alt="Yellowstone_Nature"></div>
           <div class="gallery-item"><img src="images/gallery_photo2.png" alt="Yellowstone_Nature"></div>
           <div class="gallery-item"><img src="images/gallery_photo3.png" alt="Idaho_Nature"></div>
        </div>
    </section>

    <footer>
        <p>
            <a href="https://instagram.com/veg.traveler">Instagram</a> | 
            <a href="mailto:teampaatra@gmail.com">Contact</a>
        </p>
        <p style="margin-top: 15px;">&copy; 2026 Paatra Photography.</p>
    </footer>

</body>
</html>
